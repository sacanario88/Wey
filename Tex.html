<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Extractor de Enlaces</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #f4f4f9; color: #333; }
        .box { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        textarea { width: 100%; height: 300px; margin-top: 15px; border-radius: 8px; border: 1px solid #ccc; font-family: monospace; font-size: 12px; padding: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="box">
    <h2>Extractor Web 🚀</h2>
    <input type="url" id="targetUrl" placeholder="https://ejemplo.com" value="https://">
    <button onclick="scraping()">EXTRAER AHORA</button>
    <textarea id="output" readonly placeholder="Aquí verás las etiquetas..."></textarea>
</div>

<script>
async function scraping() {
    const url = document.getElementById('targetUrl').value;
    const output = document.getElementById('output');
    
    output.value = "Consultando con la web... (si es una web protegida como Pexels, podría fallar)";

    try {
        // Usamos un proxy que suele ser más estable
        const proxy = "https://api.allorigins.win/get?url=" + encodeURIComponent(url);
        const response = await fetch(proxy);
        const data = await response.json();
        
        const parser = new DOMParser();
        const doc = parser.parseFromString(data.contents, 'text/html');
        
        // Buscamos a, link y video
        const elements = doc.querySelectorAll('a, link, video');
        let results = "";

        elements.forEach(el => {
            results += el.outerHTML + "\n\n";
        });

        output.value = results || "No se encontraron etiquetas. La web puede estar vacía o bloqueada.";
    } catch (e) {
        output.value = "Error crítico: " + e.message;
    }
}
</script>
</body>
</html>
