<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mi Player Potente</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { background: #000; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .video-container { height: 60vh; width: 100%; background: #000; }
        .vjs-matrix.video-js { color: #00ff00; } /* Estilo hacker si quieres */
        
        #mando { height: 40vh; background: #111; padding: 20px; border-top: 2px solid #27ae60; overflow-y: auto; }
        input { width: 85%; padding: 15px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; }
        button { padding: 15px; margin-top: 10px; background: #27ae60; color: white; border: none; font-weight: bold; cursor: pointer; width: 90%; }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="my-video" class="video-js vjs-big-play-centered vjs-fluid" controls preload="auto" width="640" height="264">
            <p class="vjs-no-js">Para ver este video, habilite JavaScript.</p>
        </video>
    </div>

    <div id="mando">
        <input type="text" id="videoUrl" placeholder="Pega el link aquí (HLS, MP4, DASH)...">
        <button onclick="cargarTodoTerreno()">REPRODUCIR AHORA</button>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    
    <script>
        // Inicializamos el reproductor como el de Web Video Caster
        var player = videojs('my-video', {
            html5: {
                hls: { overrideNative: true },
                nativeAudioTracks: false,
                nativeVideoTracks: false
            },
            autoplay: true,
            controls: true,
            responsive: true
        });

        function cargarTodoTerreno() {
            var url = document.getElementById('videoUrl').value;
            if(!url) return;

            // Detectamos el tipo automáticamente para que actúe como Exoplayer
            var tipo = "video/mp4"; // Por defecto
            if(url.includes(".m3u8")) tipo = "application/x-mpegURL";
            if(url.includes(".mpd")) tipo = "application/dash+xml";

            player.src({
                src: url,
                type: tipo
            });

            player.load();
            player.play();
        }
    </script>
</body>
</html>
