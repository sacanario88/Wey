<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  padding: 10px;
}

h2 {
  text-align: center;
}

/* Botones */
.botones {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 10px;
}

button {
  flex: 1 1 30%;
  padding: 12px;
  font-size: 14px;
  background: #333;
  color: white;
  border: none;
  border-radius: 8px;
}

button:active {
  background: #555;
}

/* Editor */
textarea {
  width: 100%;
  height: 120px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-bottom: 10px;
}

/* Botones principales */
.accion {
  width: 100%;
  margin-top: 5px;
}

.mostrar {
  background: #0a84ff;
}

.guardar {
  background: #28a745;
}

/* Preview normal */
#preview {
  background: white;
  color: black;
  padding: 10px;
  border-radius: 8px;
  min-height: 100px;
  margin-top: 10px;
}

/* Popup */
#popup {
  position: fixed;
  top: 20%;
  left: 5%;
  width: 90%;
  height: 60%;
  background: white;
  color: black;
  border-radius: 10px;
  display: none;
  flex-direction: column;
  overflow: hidden;
  z-index: 999;
}

#barra {
  background: #222;
  color: white;
  padding: 5px;
  display: flex;
  justify-content: space-between;
}

#contenido {
  flex: 1;
  padding: 10px;
  overflow: auto;
}

.minimizado {
  height: 40px !important;
}

.fullscreen {
  top: 0 !important;
  left: 0 !important;
  width: 100% !important;
  height: 100% !important;
  border-radius: 0 !important;
}
</style>
</head>

<body>

<h2>Mini Editor HTML</h2>

<div class="botones">
  <button onclick="insertar('<iframe src=&quot;&quot; width=&quot;100%&quot; height=&quot;200&quot;></iframe>')">Iframe</button>
  
<button onclick="insertar('<video controls style=&quot;width:100%; aspect-ratio:16/9; object-fit:cover; border:1px solid #222;&quot;><source src=&quot;&quot; type=&quot;video/mp4&quot;></video>')">
  Video
</button>
  
  <button onclick="insertar('<button>Botón</button>')">Botón</button>
  
  <button onclick="insertar('<input placeholder=&quot;Texto&quot;>')">Input</button>
  
  <button onclick="insertar('<h1>Título</h1>')">H1</button>
  
  <button onclick="insertar('<p>Texto</p>')">Texto</button>
  
  <button onclick="insertar('<img src=&quot;&quot; width=&quot;100%&quot;>')">Imagen</button>
</div>

<textarea id="editor" placeholder="Escribe o inserta HTML..."></textarea>

<button class="accion mostrar" onclick="renderizar()">Mostrar resultado</button>

<button class="accion guardar" onclick="guardarHTML()">Guardar HTML</button>

<button class="accion" onclick="abrir()">Ver en popup</button>

<div id="preview"></div>

<!-- POPUP -->
<div id="popup">
  <div id="barra">
    <span>Preview</span>
    <div>
      <button onclick="minimizar()">_</button>
      <button onclick="fullscreen()">[ ]</button>
      <button onclick="cerrar()">X</button>
    </div>
  </div>
  <div id="contenido"></div>
</div>

<script>
function insertar(codigo) {
  const editor = document.getElementById("editor");
  editor.value += codigo + "\n";
}

function renderizar() {
  const codigo = document.getElementById("editor").value;
  document.getElementById("preview").innerHTML = codigo;
}

function abrir() {
  const codigo = document.getElementById("editor").value;
  document.getElementById("contenido").innerHTML = codigo;
  document.getElementById("popup").style.display = "flex";
}

function cerrar() {
  document.getElementById("popup").style.display = "none";
}

function minimizar() {
  document.getElementById("popup").classList.toggle("minimizado");
}

function fullscreen() {
  document.getElementById("popup").classList.toggle("fullscreen");
}

function guardarHTML() {
  const codigo = document.getElementById("editor").value;

  const plantilla = `
<!DOCTYPE html>
<html lang="es">
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi página</title>
</head>
<body>
${codigo}
</body>
</html>`;

  const blob = new Blob([plantilla], { type: "text/html" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "mi_pagina.html";
  a.click();

  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
