
<!DOCTYPE html>
<html lang="es">
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi página</title>
</head>
<body>
<h1>Emisoras De Musica</h1>
<p id="info-radio">Selecciona una emisora</p>
<audio id="reproductor" Controls>
    Tu navegador no soporta el elemento de audio.
</audio>


<label for="volumen">Volumen:</label>
<input type="range" id="volumen" min="0" max="1" step="0.1" value="0.5" oninput="ajustarVolumen(this.value)">
<img src="" width="100%"><br><br>

<button class="guardar" onclick="cambiarRadio('https://uk1.streamingpulse.com/ssl/inolvidablefm', 'Radio inolvidablefm')">Radio</button>

<button class="guardar" onclick="cambiarRadio('https://kissfm.kissfmradio.cires21.com/kissfm.mp3', 'Radio Kissfm')">Radio</button>
<button class="guardar" onclick="cambiarRadio('https://22593.live.streamtheworld.com/CADENADIAL.mp3', 'Radio Cadena Dial')">Radio</button>
<button class="guardar" onclick="cambiarRadio('https://recuerda.streeemer.com/listen/recuerda/radio.aac', 'Radio Recuerda')">Radio</button><br><br><button class="guardar" onclick="cambiarRadio('https://latina.streeemer.com/listen/latina/radio.aac', 'Radio Latina')">Radio</button>
<button class="guardar" onclick="cambiarRadio('https://cadena100-cope-rrcast.flumotion.com/cope/cadena100-low.mp3', 'Radio Cadena 100')">Radio</button>
<button class="guardar" onclick="cambiarRadio('https://latinabachata.ice.infomaniak.ch/latinabachata.mp3', 'Radio Cadena Bachata')"
>Radio</button>
<button class="guardar" onclick="cambiarRadio('http://radio.domiplay.net:2002/;stream.mp3', 'Radio Cadena Domiplay')">Radio</button>
<script>
    function ajustarVolumen(valor) {
        const radio = document.getElementById('reproductor');
        radio.volume = valor;
    }
</script>
<script>
function cambiarRadio(url, nombreEmisora) {
    const radio = document.getElementById('reproductor');
    const letrero = document.getElementById('info-radio');
    
    radio.src = url;
    radio.play();
    
    // Actualiza el texto en pantalla
    letrero.innerText = "Reproduciendo: " + nombreEmisora;
}

</script>
<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  padding: 10px;
}

h2 {
  text-align: center;
}

/* Botones */
.botones {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 10px;
}

button {
  flex: 1 1 30%;
  padding: 12px;
  font-size: 14px;
  background: #333;
  color: white;
  border: none;
  border-radius: 8px;
}

button:active {
  background: #555;
}

/* Editor */
textarea {
  width: 100%;
  height: 120px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-bottom: 10px;
}

/* Botones principales */
.accion {
  width: 100%;
  margin-top: 5px;
}

.mostrar {
  background: #0a84ff;
}

.guardar {
  background: #28a745;
}

/* Preview normal */
#preview {
  background: white;
  color: black;
  padding: 10px;
  border-radius: 8px;
  min-height: 100px;
  margin-top: 10px;
}

/* Popup */
#popup {
  position: fixed;
  top: 20%;
  left: 5%;
  width: 90%;
  height: 60%;
  background: white;
  color: black;
  border-radius: 10px;
  display: none;
  flex-direction: column;
  overflow: hidden;
  z-index: 999;
}

#barra {
  background: #222;
  color: white;
  padding: 5px;
  display: flex;
  justify-content: space-between;
}

#contenido {
  flex: 1;
  padding: 10px;
  overflow: auto;
}

.minimizado {
  height: 40px !important;
}

.fullscreen {
  top: 0 !important;
  left: 0 !important;
  width: 100% !important;
  height: 100% !important;
  border-radius: 0 !important;
}
</style>
</body>
</html>
