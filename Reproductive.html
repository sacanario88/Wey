<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player Local - Gemini</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg: #0f0f0f;
            --panel: #1e1e1e;
            --accent: #00d2ff;
            --text: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: var(--panel);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }

        .upload-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="file"] {
            background: #333;
            padding: 5px;
            border-radius: 5px;
            font-size: 0.8rem;
        }

        .main-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        .video-section {
            flex-grow: 1;
            background: #000;
            position: relative;
        }

        .playlist-section {
            width: 320px;
            background: var(--panel);
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
        }

        .playlist-header {
            padding: 15px;
            font-weight: bold;
            background: #252525;
            display: flex;
            justify-content: space-between;
        }

        #search-channels {
            width: 90%;
            margin: 10px auto;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #000;
            color: white;
        }

        #channel-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }

        .channel-item {
            padding: 12px 15px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .channel-item:hover { background: #333; }
        .channel-item.active {
            background: #252525;
            border-left: 4px solid var(--accent);
            color: var(--accent);
        }

        /* --- LAS 3 LÍNEAS MÁGICAS PARA PANTALLA COMPLETA --- */
        .video-js { width: 100% !important; height: 100% !important; }
        
        /* Esto fuerza al video a estirarse y llenar todo el hueco negro */
        .vjs-tech { object-fit: cover !important; } 
        
        /* Esto asegura que los botones de play/pausa salgan siempre delante */
        .vjs-control-bar { z-index: 10 !important; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 1.2rem; font-weight: bold; color: var(--accent);">GEMINI IPTV</div>
    <div class="upload-area">
        <span>Cargar archivo .m3u:</span>
        <input type="file" id="file-input" accept=".m3u,.m3u8">
    </div>
</header>

<div class="main-container">
    <div class="video-section">
        <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto">
            <p class="vjs-no-js">Habilita JavaScript para ver el video.</p>
        </video>
    </div>

    <div class="playlist-section">
        <div class="playlist-header">LISTA DE CANALES</div>
        <input type="text" id="search-channels" placeholder="Buscar canal..." onkeyup="filterChannels()">
        <ul id="channel-list">
            <li style="padding: 20px; color: #888;">Selecciona un archivo .m3u arriba para empezar</li>
        </ul>
    </div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script>
    // Inicialización simple, sin opciones raras para no romper los botones
    const player = videojs('my-video');
    
    const fileInput = document.getElementById('file-input');
    const channelList = document.getElementById('channel-list');
    let allChannels = [];

    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const content = e.target.result;
            parseM3U(content);
        };
        reader.readAsText(file);
    });

    function parseM3U(content) {
        channelList.innerHTML = "";
        allChannels = [];
        const lines = content.split('\n');
        let currentChannelName = "";

        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                currentChannelName = line.split(',').pop() || "Canal sin nombre";
            } else if (line.startsWith('http')) {
                const channel = { name: currentChannelName, url: line };
                allChannels.push(channel);
                currentChannelName = "";
            }
        });

        renderChannels(allChannels);
    }

    function renderChannels(channels) {
        channelList.innerHTML = "";
        channels.forEach(channel => {
            const li = document.createElement('li');
            li.className = 'channel-item';
            li.innerHTML = `<span>📺</span> ${channel.name}`;
            li.onclick = () => {
                document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
                li.classList.add('active');
                
                player.src({ type: 'application/x-mpegURL', src: channel.url });
                player.play();
            };
            channelList.appendChild(li);
        });
    }

    function filterChannels() {
        const query = document.getElementById('search-channels').value.toLowerCase();
        const filtered = allChannels.filter(c => c.name.toLowerCase().includes(query));
        renderChannels(filtered);
    }
</script>

</body>
  </html>
