<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Reproductor TV — Completo</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#fff; font-family:sans-serif; overflow:hidden; cursor:none; }

/* 🖱️ Puntero personalizado */
#puntero {
  position:fixed; top:0; left:0;
  width:22px; height:22px;
  background:#00ccff; border-radius:50%;
  box-shadow:0 0 10px #00ccff;
  pointer-events:none; z-index:999999;
  opacity:1; transition:opacity 0.4s ease;
}
#puntero.oculto { opacity:0; }

/* 📺 Reproductor */
#reproductor {
  width:100vw; height:100vh;
  object-fit:contain; background:#000;
}
#controles { position:fixed; top:10px; left:10px; z-index:10; }
button,input { padding:8px 12px; font-size:14px; border-radius:4px; border:none; margin:4px; }
input { width:320px; background:#222; color:#fff; }
</style>
<!-- 🖱️ Puntero -->
<div id="puntero"></div>

<!-- 🎛️ Controles -->
<div id="controles">
  <input id="enlace" placeholder="URL .m3u8 o .mp4">
  <button onclick="cargar()">▶️ Cargar</button>
  <button onclick="pantallaCompleta()">⛶ Pantalla</button>
  <button id="btnGrabar">⏺️ Grabar</button>
</div>

<!-- 🎬 Vídeo -->
<video id="reproductor" controls playsinline preload="auto"></video>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const v = document.getElementById('reproductor');
const puntero = document.getElementById('puntero');
let tPuntero; let grabacion; let flujo;

// 🖱️ Seguir puntero — ocultar tras 2s
document.addEventListener('mousemove',e=>{
  puntero.style.transform = `translate(${e.clientX-11}px,${e.clientY-11}px)`;
  puntero.classList.remove('oculto');
  clearTimeout(tPuntero);
  tPuntero = setTimeout(()=>puntero.classList.add('oculto'),2000);
});

// 📺 HLS optimizado para TV
function cargarHLS(url){
  if(Hls.isSupported()){
    const hls=new Hls({
      enableWorker:true, lowLatencyMode:true,
      maxBufferLength:20, maxMaxBufferLength:40,
      backBufferLength:60, startLevel:-1,
      capLevelToPlayerSize:true, fragLoadingTimeOut:15000, manifestLoadingTimeOut:8000
    });
    hls.loadSource(url); hls.attachMedia(v);
  }else if(v.canPlayType('application/vnd.apple.mpegurl')) v.src=url;
}

// 🚀 Cargar automático: HLS o MP4
function cargar(){
  const url=document.getElementById('enlace').value.trim();
  if(!url)return;
  if(url.includes('.m3u8')) cargarHLS(url);
  else { if(window.Hls)Hls.destroyAll(); v.src=url; }
  v.play().catch(e=>console.log(e));
}

// ⛶ Pantalla completa — compatible TV
function pantallaCompleta(){
  if(!document.fullscreenElement)
    v.requestFullscreen?.() || v.webkitRequestFullscreen?.() || v.msRequestFullscreen?.();
  else document.exitFullscreen?.();
}

// 📹 Grabación sencilla
document.getElementById('btnGrabar').addEventListener('click',()=>{
  if(!grabacion){
    flujo = v.captureStream();
    grabacion = new MediaRecorder(flujo);
    let datos=[];
    grabacion.ondataavailable=e=>e.data.size&&datos.push(e.data);
    grabacion.onstop=()=>{
      const a=document.createElement('a');
      a.href=URL.createObjectURL(new Blob(datos,{type:'video/mp4'}));
      a.download='stream_grabado.mp4'; a.click(); URL.revokeObjectURL(a.href);
    };
    grabacion.start(); this.textContent='⏹️ Parar';
  }else{ grabacion.stop(); grabacion=null; this.textContent='⏺️ Grabar'; }
});

// 🎮 Activar con tecla Enter en campo
document.getElementById('enlace').addEventListener('keypress',e=>{if(e.key==='Enter')cargar()});
</script>
</html>
