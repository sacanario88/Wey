<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cam Pro</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
}

video {
  width: 100%;
  max-height: 60vh;
  background: black;
}

.controls {
  margin-top: 10px;
}

button, input {
  padding: 10px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
}

button {
  background: #333;
  color: white;
}

button:hover {
  background: #555;
}

#recording {
  color: red;
  font-weight: bold;
  display: none;
}
</style>
</head>

<body>

<h2>📷 Cámara Pro</h2>

<video Controls style="width:100%; aspect-ratio:16/9; object-fit:cover; border:1px solid #222;" id="video" autoplay playsinline></video>

<div id="recording">🔴 Grabando...</div>

<div class="controls">
  <button onclick="startCamera()">Encender cámara</button>
  <button onclick="switchCamera()">Cambiar cámara</button>
  <br>
  <button onclick="startRecording()">Grabar</button>
  <button onclick="stopRecording()">Detener</button>
  <button onclick="toggleMute()">Mute</button>
</div>

<div class="controls">
  <label>Volumen</label><br>
  <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
</div>

<script>
let stream;
let mediaRecorder;
let chunks = [];
let currentFacing = "user";

const video = document.getElementById("video");
const volumeControl = document.getElementById("volume");
const recIndicator = document.getElementById("recording");

// 📷 Iniciar cámara
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: currentFacing },
      audio: true
    });

    video.srcObject = stream;
  } catch (e) {
    alert("Error al acceder a la cámara");
    console.error(e);
  }
}

// 🔄 Cambiar cámara
async function switchCamera() {
  currentFacing = currentFacing === "user" ? "environment" : "user";

  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }

  startCamera();
}

// 🔊 Volumen
volumeControl.addEventListener("input", () => {
  video.volume = volumeControl.value;
});

// 🔇 Mute
function toggleMute() {
  video.muted = !video.muted;
}

// 🔴 Grabar
function startRecording() {
  if (!stream) {
    alert("Primero enciende la cámara");
    return;
  }

  chunks = [];
  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => {
    chunks.push(e.data);
  };

  mediaRecorder.onstop = () => {
    const blob = new Blob(chunks, { type: "video/webm" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "grabacion.webm";
    a.click();

    recIndicator.style.display = "none";
  };

  mediaRecorder.start();
  recIndicator.style.display = "block";
}

// ⛔ Detener grabación
function stopRecording() {
  if (mediaRecorder) {
    mediaRecorder.stop();
  }
}
</script>

</body>
</html>
