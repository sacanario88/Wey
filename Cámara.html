<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cam Stream</title>

<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
}

video {
  width: 100%;
  max-height: 60vh;
  background: black;
}

.controls {
  margin-top: 10px;
}

button {
  padding: 10px;
  margin: 5px;
  border: none;
  background: #333;
  color: white;
  border-radius: 8px;
  font-size: 16px;
}

button:hover {
  background: #555;
}
</style>
</head>

<body>

<h2>📷 Cámara en vivo</h2>

<video id="video" autoplay playsinline></video>

<div class="controls">
  <button onclick="startCamera()">Encender cámara</button>
  <button onclick="startRecording()">Grabar</button>
  <button onclick="stopRecording()">Detener</button>
</div>

<script>
let stream;
let mediaRecorder;
let chunks = [];

async function startCamera() {
  stream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  document.getElementById("video").srcObject = stream;
}

function startRecording() {
  if (!stream) {
    alert("Primero enciende la cámara");
    return;
  }

  chunks = [];
  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e => {
    chunks.push(e.data);
  };

  mediaRecorder.onstop = () => {
    const blob = new Blob(chunks, { type: "video/webm" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "grabacion.webm";
    a.click();
  };

  mediaRecorder.start();
}

function stopRecording() {
  if (mediaRecorder) {
    mediaRecorder.stop();
  }
}
</script>

</body>
</html>
