<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Reproductor HLS</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    font-family: Arial;
    background: #111;
    color: #fff;
    text-align: center;
}
input {
    width: 80%;
    padding: 8px;
    margin: 10px;
}
button {
    padding: 10px;
    margin: 5px;
}
video {
    width: 100%;
    max-width: 600px;
    margin-top: 10px;
}
</style>
</head>

<body>

<h2>Reproductor (MP4 + M3U8)</h2>

<div>
    <input type="text" id="videoUrlInput" placeholder="Pega URL (.mp4 o .m3u8)">
    <button onclick="cargarVideo()">Cargar Video</button>
</div>

<video id="videoPlayer" controls></video>

<div id="status">Estado: Esperando URL...</div>

<div>
    <button id="playPauseBtn">Reproducir</button>
    <button id="stopBtn">Detener</button>
</div>

<script>
const video = document.getElementById('videoPlayer');
const input = document.getElementById('videoUrlInput');
const status = document.getElementById('status');
const playBtn = document.getElementById('playPauseBtn');
const stopBtn = document.getElementById('stopBtn');

let hls;

function cargarVideo() {
    const url = input.value.trim();

    if (!url) {
        status.textContent = "Estado: URL vacía";
        return;
    }

    // limpiar anterior
    if (hls) {
        hls.destroy();
    }

    // Si es m3u8
    if (url.endsWith(".m3u8")) {

        if (Hls.isSupported()) {
            hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            status.textContent = "Estado: HLS cargado";
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Safari / algunos navegadores
            video.src = url;
            status.textContent = "Estado: HLS nativo";
        } else {
            status.textContent = "Estado: HLS no soportado";
        }

    } else {
        // Video normal (mp4, etc)
        video.src = url;
        status.textContent = "Estado: Video normal cargado";
    }
}

// Play / Pause
playBtn.onclick = () => {
    if (video.paused) {
        video.play();
        playBtn.textContent = "Pausar";
    } else {
        video.pause();
        playBtn.textContent = "Reproducir";
    }
};

// Stop
stopBtn.onclick = () => {
    video.pause();
    video.currentTime = 0;
    playBtn.textContent = "Reproducir";
};
</script>

</body>
</html>
