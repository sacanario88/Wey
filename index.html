<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SACANARIO HUB</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #38bdf8; --border: #333; }
        body { background-color: var(--bg); color: white; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 20px; }
        h1 { color: var(--accent); margin-bottom: 20px; font-size: 1.6rem; text-transform: uppercase; letter-spacing: 2px; }
        
        .search-box { margin-bottom: 25px; position: sticky; top: 10px; z-index: 100; }
        .search-box input {
            width: 90%; max-width: 400px; padding: 14px 20px; border-radius: 30px;
            border: 1px solid var(--border); background: #252525; color: white;
            outline: none; font-size: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px; max-width: 800px; margin: 0 auto;
        }

        .card {
            background-color: var(--card); border: 1px solid var(--border);
            border-radius: 15px; padding: 20px 10px; text-decoration: none;
            color: white; display: flex; flex-direction: column; align-items: center;
            transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card:active { transform: scale(0.9); background-color: var(--accent); color: var(--bg); }
        .card.hidden { display: none; }
        .emoji { font-size: 2.2rem; margin-bottom: 10px; }
        .card span:last-child { font-weight: bold; font-size: 0.9rem; text-transform: capitalize; }
    </style>
</head>
<body>

    <h1>SACANARIO HUB</h1>
    
    <div class="search-box">
        <input type="text" id="buscador" placeholder="Buscar herramienta..." oninput="filtrar()">
    </div>

    <div class="grid" id="lista-apps"></div>

    <script>
        const usuario = "sacanario88";
        const repo = "Wey";

        async function cargarProyectos() {
            const contenedor = document.getElementById('lista-apps');
            try {
                const res = await fetch(`https://api.github.com/repos/${usuario}/${repo}/contents/`);
                const archivos = await res.json();

                // Filtrar solo archivos .html que no sean index.html
                const proyectos = archivos.filter(f => f.name.endsWith('.html') && f.name.toLowerCase() !== 'index.html');

                proyectos.forEach(archivo => {
                    const nombreLimpio = archivo.name.replace('.html', '').replace(/_/g, ' ');
                    
                    const card = document.createElement('a');
                    card.href = archivo.name;
                    card.className = 'card';
                    // Si el nombre es "gamepack", le ponemos el borde dorado que tenías
                    if(nombreLimpio.toLowerCase().includes('gamepack')) card.style.borderColor = '#ffcc00';

                    card.innerHTML = `
                        <span class="emoji">🛠️</span>
                        <span>${nombreLimpio}</span>
                    `;
                    contenedor.appendChild(card);
                });
            } catch (error) {
                console.error("Error cargando proyectos:", error);
            }
        }

        function filtrar() {
            const texto = document.getElementById('buscador').value.toLowerCase();
            const tarjetas = document.querySelectorAll('.card');
            tarjetas.forEach(tarjeta => {
                const nombreApp = tarjeta.querySelector('span:last-child').innerText.toLowerCase();
                tarjeta.classList.toggle('hidden', !nombreApp.includes(texto));
            });
        }

        // Ejecutar al cargar la página
        cargarProyectos();
    </script>

</body>
</html>
