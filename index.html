<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SACANARIO HUB</title>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
        }
        .search-box {
            margin: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px;
        }
        .card {
            background-color: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Welcome to SACANARIO HUB</h1>
    <div class="search-box">
        <input type="text" placeholder="Search..." />
    </div>
    <div class="grid">
        <div class="card">jsgo</div>
        <div class="card">Traductor</div>
        <div class="card">Agenda</div>
        <div class="card">Receptor</div>
        <div class="card">Reproductor</div>
    </div>
</body>
</html>
