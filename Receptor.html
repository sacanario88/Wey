<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptor de Audio - Estudio</title>
    <style>
        :root {
            --primary: #1cb0f6;
            --success: #58cc02;
            --bg: #f0f2f5;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 { color: var(--primary); margin-top: 0; }

        .field-group { text-align: left; margin-bottom: 15px; }

        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }

        select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e5e5;
            border-radius: 12px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }

        textarea { height: 150px; resize: none; font-size: 18px; }

        .main-btn {
            width: 100%;
            background-color: var(--success);
            color: white;
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 0 #46a302;
            margin-bottom: 15px;
        }

        .main-btn:active { transform: translateY(4px); box-shadow: none; }

        .secondary-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .sec-btn {
            background-color: #e5e5e5;
            color: #4b4b4b;
            border: none;
            padding: 10px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Receptor de Voz</h2>
    
    <div class="field-group">
        <label for="idioma">Idioma:</label>
        <select id="idioma">
            <option value="en-US">Inglés (EE.UU.) 🇺🇸</option>
            <option value="en-GB">Inglés (Reino Unido) 🇬🇧</option>
            <option value="es-ES">Español 🇪🇸</option>
            <option value="pt-BR">Portugués 🇧🇷</option>
            <option value="it-IT">Italiano 🇮🇹</option>
            <option value="fr-FR">Francés 🇫🇷</option>
        </select>
    </div>

    <div class="field-group">
        <textarea id="textoInput" placeholder="Pega aquí el texto de tu nota..."></textarea>
    </div>

    <button class="main-btn" onclick="reproducir(1)">🔊 REPRODUCIR</button>

    <div class="secondary-btns">
        <button class="sec-btn" onclick="reproducir(0.6)">🐢 Lento</button>
        <button class="sec-btn" onclick="limpiar()">🗑️ Borrar</button>
    </div>
</div>

<script>
    function reproducir(velocidad) {
        const texto = document.getElementById('textoInput').value;
        const idioma = document.getElementById('idioma').value;
        if (!texto.trim()) return;

        window.speechSynthesis.cancel();
        const lectura = new SpeechSynthesisUtterance(texto);
        lectura.lang = idioma;
        lectura.rate = velocidad;
        window.speechSynthesis.speak(lectura);
    }

    function limpiar() {
        document.getElementById('textoInput').value = "";
        window.speechSynthesis.cancel();
    }
</script>

</body>
</html>
