
<!DOCTYPE html>
<html lang="es">
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi página</title>
</head>
<body>
<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  padding: 10px;
}

h2 {
  text-align: center;
}

/* Botones */
.botones {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 10px;
}

button {
  flex: 1 1 30%;
  padding: 12px;
  font-size: 14px;
  background: #333;
  color: white;
  border: none;
  border-radius: 8px;
}

button:active {
  background: #555;
}

/* Editor */
textarea {
  width: 100%;
  height: 120px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-bottom: 10px;
}

/* Botones principales */
.accion {
  width: 100%;
  margin-top: 5px;
}

.mostrar {
  background: #0a84ff;
}

.guardar {
  background: #28a745;
}

/* Preview normal */
#preview {
  background: white;
  color: black;
  padding: 10px;
  border-radius: 8px;
  min-height: 100px;
  margin-top: 10px;
}

/* Popup */
#popup {
  position: fixed;
  top: 20%;
  left: 5%;
  width: 90%;
  height: 60%;
  background: white;
  color: black;
  border-radius: 10px;
  display: none;
  flex-direction: column;
  overflow: hidden;
  z-index: 999;
}

#barra {
  background: #222;
  color: white;
  padding: 5px;
  display: flex;
  justify-content: space-between;
}

#contenido {
  flex: 1;
  padding: 10px;
  overflow: auto;
}

.minimizado {
  height: 40px !important;
}

.fullscreen {
  top: 0 !important;
  left: 0 !important;
  width: 100% !important;
  height: 100% !important;
  border-radius: 0 !important;
}
</style>


<video id="video" controls style="width:100%; aspect-ratio:16/9; object-fit:cover; border:1px solid #222;"></video>
<input id="repro" placeholder="Tipe m3u8">
<button class="guardar"     onclick="cargarVideo()">Enlace-m3u8</button><br><br>

<video id="reproductor-pro" controls style="width:100%; aspect-ratio:16/9; object-fit:cover; border:1px solid #222;"><source src="" type="video/mp4"></video>
<input id="url-video" placeholder="Tipe mp4;m3u8">
<button class="guardar" onclick="cargarNuevoVideo()">Enlace-mp4</button>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
  var video = document.getElementById('video');
  var hls;

  function cargarVideo() {
    var url = document.getElementById('repro').value;

    if (Hls.isSupported()) {
      if (hls) {
        hls.destroy(); // limpia instancia anterior
      }
      hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
    }
  }

function cargarNuevoVideo() {
    // 1. Obtenemos lo que se pegó en el input
    var textoPegado = document.getElementById('url-video').value;
    
    // 2. DECODIFICACIÓN: Convierte %2D en -, %20 en espacio, etc.
    var urlLimpia = decodeURIComponent(textoPegado);
    
    // 3. Buscamos el elemento video
    var video = document.getElementById('reproductor-pro');
    
    if (urlLimpia) {
        // Aplicamos la URL ya traducida al video
        video.src = urlLimpia;
        video.load();
        video.play();
        
        // Opcional: Actualizamos el input para que veas la URL real
        document.getElementById('url-video').value = urlLimpia;
        console.log("URL procesada: " + urlLimpia);
    } else {
        alert("Por favor, pega una dirección primero.");
    }
}
function ponerTexto(el) {
  document.getElementById("url-video").value = el.textContent;
}
</script>
</body>
</html>
